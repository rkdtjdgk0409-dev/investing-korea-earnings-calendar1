<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>한국 기업 실적 캘린더</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
  <style>
    :root {
      --bg: #0f151b;
      --panel: #171f28;
      --line: #2c3743;
      --text: #f5f7fa;
      --muted: #97a3af;
      --event: #293c4e;
      --warning-bg: #352d1f;
      --warning-line: #715c34;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 5px;
      font-size: 22px;
    }

    #status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    #notice {
      display: none;
      margin-bottom: 12px;
      padding: 11px 13px;
      border: 1px solid var(--warning-line);
      border-radius: 9px;
      background: var(--warning-bg);
      font-size: 13px;
      line-height: 1.5;
    }

    .ics {
      flex: 0 0 auto;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
    }

    #calendar {
      min-height: 720px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
    }

    .fc {
      --fc-border-color: var(--line);
      --fc-page-bg-color: var(--panel);
      --fc-neutral-bg-color: #1d2731;
      --fc-list-event-hover-bg-color: #263442;
      --fc-today-bg-color: rgba(160, 140, 50, .17);
      --fc-small-font-size: .78em;
    }

    .fc .fc-toolbar-title {
      font-size: 18px;
    }

    .fc .fc-button-primary {
      border-color: #3b4957;
      background: #293642;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      border-color: #536372;
      background: #3a4a59;
    }

    .fc .fc-daygrid-day-number,
    .fc .fc-col-header-cell-cushion,
    .fc .fc-multimonth-title,
    .fc .fc-list-day-text,
    .fc .fc-list-day-side-text {
      color: var(--text);
      text-decoration: none;
    }

    .fc .fc-daygrid-event {
      padding: 2px 4px;
      border: 0;
      border-radius: 4px;
      background: var(--event);
      cursor: pointer;
    }

    .fc .fc-event-title {
      font-weight: 700;
    }

    .fc .fc-multimonth {
      border: 0;
    }

    @media (max-width: 850px) {
      .wrap { padding: 8px; }
      .top { align-items: flex-start; }
      h1 { font-size: 18px; }
      #calendar { min-height: 660px; padding: 4px; }
      .fc .fc-toolbar { gap: 4px; }
      .fc .fc-toolbar-title { font-size: 14px; }
      .fc .fc-button { padding: .34em .46em; font-size: .82em; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>한국 기업 실적 캘린더</h1>
        <div id="status">v5.1 데이터를 불러오는 중입니다.</div>
      </div>
      <a class="ics" href="./earnings.ics">ICS</a>
    </div>

    <div id="notice"></div>
    <div id="calendar"></div>
  </main>

  <script>
    const EXPECTED_VERSION = "v5.1-strict-rolling-3month";

    function nextDay(isoDate) {
      const value = new Date(isoDate + "T00:00:00+09:00");
      value.setDate(value.getDate() + 1);
      return value.toISOString().slice(0, 10);
    }

    function monthSummary(eventsByMonth) {
      return Object.entries(eventsByMonth || {})
        .map(([month, count]) => `${month} ${count}건`)
        .join(" · ");
    }

    async function loadCalendar() {
      const cacheKey = Date.now();

      const [eventsResponse, statusResponse] = await Promise.all([
        fetch("./data/events.json?v=" + cacheKey),
        fetch("./data/status.json?v=" + cacheKey)
      ]);

      if (!eventsResponse.ok || !statusResponse.ok) {
        throw new Error("GitHub Pages 데이터 파일을 불러오지 못했습니다.");
      }

      const rawEvents = await eventsResponse.json();
      const status = await statusResponse.json();

      if (status.version !== EXPECTED_VERSION) {
        throw new Error(
          `이전 코드가 실행 중입니다. 현재 ${status.version || "버전 없음"}, ` +
          `필요 버전 ${EXPECTED_VERSION}`
        );
      }

      const events = rawEvents
        .map((event) => ({
          ...event,
          marketCap: Number(event.marketCap || 0),
          title:
            event.title ||
            ((event.company || event.ticker || "기업") + " 실적"),
          allDay: true
        }))
        .sort((a, b) => {
          const dateResult = String(a.start).localeCompare(String(b.start));
          if (dateResult !== 0) return dateResult;

          const capResult = b.marketCap - a.marketCap;
          if (capResult !== 0) return capResult;

          return a.title.localeCompare(b.title, "ko");
        });

      const rangeFrom = status.range.from;
      const rangeTo = status.range.to;
      const updatedAt = new Date(status.updated_at).toLocaleString("ko-KR");
      const months = monthSummary(status.events_by_month);

      document.getElementById("status").textContent =
        `${status.version} · Investing.com · 한국 · 중요도 높음 · ` +
        `${rangeFrom} ~ ${rangeTo} · ${events.length}건 · 시가총액순 · ` +
        `${months || "등록 일정 없음"} · ${updatedAt} 갱신`;

      const notice = document.getElementById("notice");

      if (!status.ok) {
        notice.style.display = "block";
        notice.textContent =
          `${status.failed_window_count}개 날짜 구간의 수집 검증이 실패했습니다. ` +
          `Actions 로그와 docs/data/status.json을 확인하세요.`;
      } else if (events.length === 0) {
        notice.style.display = "block";
        notice.textContent =
          "조회 기간 안에 Investing.com에 등록된 한국·중요도 높음 실적 일정이 없습니다.";
      } else if (status.last_event_date < rangeTo) {
        notice.style.display = "block";
        notice.textContent =
          `조회 범위는 ${rangeTo}까지 정상입니다. 다만 Investing.com에 현재 등록된 ` +
          `마지막 대상 일정은 ${status.last_event_date}입니다. 이후 날짜가 비어 있는 것은 ` +
          `아직 발표 일정이 등록되지 않았기 때문일 수 있습니다.`;
      }

      const mobile = window.innerWidth < 850;

      const calendar = new FullCalendar.Calendar(
        document.getElementById("calendar"),
        {
          locale: "ko",
          initialDate: rangeFrom,
          initialView: mobile
            ? "multiMonthThreeMonth"
            : "multiMonthThreeMonth",

          views: {
            multiMonthThreeMonth: {
              type: "multiMonth",
              duration: { months: 3 },
              buttonText: "3개월"
            },
            listThreeMonth: {
              type: "list",
              duration: { months: 3 },
              buttonText: "3개월 목록"
            }
          },

          multiMonthMaxColumns: mobile ? 1 : 3,
          height: "auto",

          validRange: {
            start: rangeFrom,
            end: nextDay(rangeTo)
          },

          headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "multiMonthThreeMonth,dayGridMonth,listThreeMonth"
          },

          buttonText: {
            today: "오늘",
            month: "월"
          },

          events,
          displayEventTime: false,
          eventDisplay: "block",
          dayMaxEvents: 4,

          // 같은 날짜에서는 시가총액 내림차순으로 고정합니다.
          eventOrder: "-marketCap,title",
          eventOrderStrict: true,

          eventDidMount(info) {
            info.el.title = info.event.title;
          },

          eventClick(info) {
            info.jsEvent.preventDefault();
            if (info.event.url) {
              window.open(info.event.url, "_blank", "noopener");
            }
          }
        }
      );

      calendar.render();
    }

    loadCalendar().catch((error) => {
      console.error(error);
      document.getElementById("status").textContent = "캘린더 로드 실패";

      const notice = document.getElementById("notice");
      notice.style.display = "block";
      notice.textContent = error.message;
    });
  </script>
</body>
</html>
