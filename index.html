<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>한국 기업 실적 캘린더</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
  <style>
    :root {
      --bg: #10151b;
      --panel: #171e26;
      --line: #2a3440;
      --text: #f3f6f8;
      --muted: #96a0aa;
      --event: #2c4358;
      --warning-bg: #352d1f;
      --warning-line: #6e5b36;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      margin-bottom: 14px;
    }

    h1 { margin: 0 0 4px; font-size: 22px; }

    #status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    #notice {
      display: none;
      margin-bottom: 12px;
      padding: 11px 13px;
      border: 1px solid var(--warning-line);
      border-radius: 9px;
      background: var(--warning-bg);
      font-size: 13px;
      line-height: 1.5;
    }

    .ics {
      flex: 0 0 auto;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
    }

    #calendar {
      min-height: 680px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
    }

    .fc {
      --fc-border-color: var(--line);
      --fc-page-bg-color: var(--panel);
      --fc-neutral-bg-color: #1d2630;
      --fc-list-event-hover-bg-color: #25313d;
      --fc-today-bg-color: rgba(160, 140, 50, .17);
    }

    .fc .fc-toolbar-title { font-size: 18px; }

    .fc .fc-button-primary {
      border-color: #394653;
      background: #28333f;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      border-color: #4b5966;
      background: #3a4856;
    }

    .fc .fc-daygrid-day-number,
    .fc .fc-col-header-cell-cushion,
    .fc .fc-list-day-text,
    .fc .fc-list-day-side-text {
      color: var(--text);
      text-decoration: none;
    }

    .fc .fc-daygrid-day.fc-day-other .fc-daygrid-day-number {
      color: #67727d;
    }

    .fc .fc-event {
      padding: 2px 4px;
      border: 0;
      border-radius: 4px;
      background: var(--event);
      cursor: pointer;
    }

    .fc .fc-event-title { font-weight: 700; }

    @media (max-width: 680px) {
      .wrap { padding: 8px; }
      .top { align-items: flex-start; }
      h1 { font-size: 18px; }
      #calendar { min-height: 620px; padding: 4px; }
      .fc .fc-toolbar { gap: 4px; }
      .fc .fc-toolbar-title { font-size: 15px; }
      .fc .fc-button { padding: .35em .5em; font-size: .85em; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>한국 기업 실적 캘린더</h1>
        <div id="status">한국 상장사 실적 일정을 불러오는 중입니다.</div>
      </div>
      <a class="ics" href="./earnings.ics">ICS</a>
    </div>

    <div id="notice"></div>
    <div id="calendar" aria-label="한국 기업 실적 발표 월간 캘린더"></div>
  </main>

  <script>
    const EXPECTED_VERSION = "v6-tradingview-korea-next-earnings";

    function monthSummary(eventsByMonth) {
      return Object.entries(eventsByMonth || {})
        .map(([month, count]) => `${month} ${Number(count).toLocaleString("ko-KR")}건`)
        .join(" · ");
    }

    async function loadCalendar() {
      const cacheKey = Date.now();
      const [eventsResponse, statusResponse] = await Promise.all([
        fetch("./data/events.json?v=" + cacheKey, { cache: "no-store" }),
        fetch("./data/status.json?v=" + cacheKey, { cache: "no-store" })
      ]);

      if (!eventsResponse.ok || !statusResponse.ok) {
        throw new Error("GitHub Pages의 실적 데이터 파일을 불러오지 못했습니다.");
      }

      const rawEvents = await eventsResponse.json();
      const status = await statusResponse.json();

      if (status.version !== EXPECTED_VERSION) {
        throw new Error(
          `새 수집 파일을 한 번 실행해 주세요. 현재 ${status.version || "버전 없음"}, ` +
          `필요 버전 ${EXPECTED_VERSION}`
        );
      }

      const events = rawEvents
        .map(event => ({
          ...event,
          marketCap: Number(event.marketCap || 0),
          title: event.title || `${event.company || event.ticker || "기업"} 실적`,
          allDay: true
        }))
        .sort((a, b) => {
          const dateResult = String(a.start).localeCompare(String(b.start));
          if (dateResult !== 0) return dateResult;
          const capResult = b.marketCap - a.marketCap;
          return capResult || a.title.localeCompare(b.title, "ko");
        });

      const rangeFrom = status.range?.from;
      const rangeTo = status.range?.to;
      const updatedAt = status.updated_at
        ? new Date(status.updated_at).toLocaleString("ko-KR")
        : "";
      const months = monthSummary(status.events_by_month);

      document.getElementById("status").textContent =
        `TradingView · 한국 상장사 · ${rangeFrom || "오늘"} ~ ${rangeTo || "미래 3개월"} · ` +
        `${events.length.toLocaleString("ko-KR")}건 · 시가총액순` +
        (months ? ` · ${months}` : "") +
        (updatedAt ? ` · ${updatedAt} 갱신` : "");

      const notice = document.getElementById("notice");
      if (!status.ok) {
        notice.style.display = "block";
        notice.textContent =
          "원본 서버가 일시적으로 응답하지 않아 직전 정상 일정을 표시하고 있습니다.";
      } else if (!events.length) {
        notice.style.display = "block";
        notice.textContent = "조회 기간에 등록된 한국 기업 실적 일정이 없습니다.";
      }

      const mobile = window.innerWidth < 680;
      const calendar = new FullCalendar.Calendar(
        document.getElementById("calendar"),
        {
          locale: "ko",
          initialDate: rangeFrom || undefined,
          initialView: mobile ? "listMonth" : "dayGridMonth",
          height: "auto",

          // 오늘 이전 날짜를 금지하는 validRange를 제거했습니다.
          // 따라서 현재 달의 1일부터 말일까지 정상적인 월 달력이 표시됩니다.
          headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: mobile ? "listMonth" : "dayGridMonth,listMonth"
          },

          buttonText: { today: "오늘", month: "월", list: "목록" },
          events,
          eventDisplay: "block",
          displayEventTime: false,
          dayMaxEvents: 4,
          eventOrder: "-marketCap,title",
          eventOrderStrict: true,

          eventDidMount(info) {
            const session = info.event.extendedProps.releaseSession || "미정";
            info.el.title = `${info.event.title} · 발표시점 ${session}`;
          },

          eventClick(info) {
            info.jsEvent.preventDefault();
            if (info.event.url) {
              window.open(info.event.url, "_blank", "noopener");
            }
          }
        }
      );

      calendar.render();
    }

    loadCalendar().catch(error => {
      console.error(error);
      document.getElementById("status").textContent = "캘린더 로드 실패";
      const notice = document.getElementById("notice");
      notice.style.display = "block";
      notice.textContent = error.message;
    });
  </script>
</body>
</html>
