<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>한국 기업 실적 캘린더</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
  <style>
    :root {
      --bg: #0f151b;
      --panel: #171f28;
      --line: #2c3743;
      --text: #f5f7fa;
      --muted: #97a3af;
      --event: #315f9f;
      --event-hover: #3d73bc;
      --warning-bg: #342c1f;
      --warning-line: #705c34;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 5px;
      font-size: 22px;
    }

    #status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .ics {
      flex: 0 0 auto;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
    }

    #notice {
      display: none;
      margin-bottom: 12px;
      padding: 12px 14px;
      border: 1px solid var(--warning-line);
      border-radius: 10px;
      background: var(--warning-bg);
      line-height: 1.5;
      font-size: 13px;
    }

    #calendar {
      min-height: 680px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
    }

    .fc {
      --fc-border-color: var(--line);
      --fc-page-bg-color: var(--panel);
      --fc-neutral-bg-color: #1d2731;
      --fc-list-event-hover-bg-color: #263442;
      --fc-today-bg-color: rgba(170, 145, 55, 0.18);
    }

    .fc .fc-toolbar-title {
      font-size: 18px;
    }

    .fc .fc-button-primary {
      border-color: #3a4856;
      background: #293642;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      border-color: #526171;
      background: #3a4a59;
    }

    .fc .fc-daygrid-day-number,
    .fc .fc-col-header-cell-cushion,
    .fc .fc-list-day-text,
    .fc .fc-list-day-side-text {
      color: var(--text);
      text-decoration: none;
    }

    .fc .fc-daygrid-event,
    .fc .fc-list-event {
      border: 0;
      cursor: pointer;
    }

    .fc .fc-daygrid-event {
      padding: 3px 5px;
      border-radius: 5px;
      background: var(--event);
    }

    .fc .fc-daygrid-event:hover {
      background: var(--event-hover);
    }

    .event-label {
      overflow: hidden;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fc-list-event-title a {
      color: var(--text) !important;
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 680px) {
      .wrap { padding: 8px; }
      .top { align-items: flex-start; }
      h1 { font-size: 18px; }
      #calendar { min-height: 620px; padding: 4px; }
      .fc .fc-toolbar { gap: 4px; }
      .fc .fc-toolbar-title { font-size: 15px; }
      .fc .fc-button { padding: .35em .5em; font-size: .85em; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>한국 기업 실적 캘린더</h1>
        <div id="status">데이터를 불러오는 중입니다.</div>
      </div>
      <a class="ics" href="./earnings.ics">ICS</a>
    </div>

    <div id="notice"></div>
    <div id="calendar"></div>
  </main>

  <script>
    function addOneDay(isoDate) {
      const date = new Date(isoDate + "T00:00:00+09:00");
      date.setDate(date.getDate() + 1);
      return date.toISOString().slice(0, 10);
    }

    function eventNode(title) {
      const node = document.createElement("div");
      node.className = "event-label";
      node.textContent = title;
      return node;
    }

    async function loadCalendar() {
      const cacheKey = Date.now();

      const [eventsResponse, statusResponse] = await Promise.all([
        fetch("./data/events.json?v=" + cacheKey),
        fetch("./data/status.json?v=" + cacheKey)
      ]);

      if (!eventsResponse.ok) {
        throw new Error("events.json을 불러오지 못했습니다.");
      }

      const events = await eventsResponse.json();
      const status = statusResponse.ok ? await statusResponse.json() : {};

      // 이전 파일에서 title이 빠졌더라도 화면에서 '기업명 실적'으로 복구합니다.
      const normalizedEvents = events.map((event) => ({
        ...event,
        title: event.title || ((event.company || event.ticker || "기업") + " 실적"),
        allDay: true
      }));

      const rangeFrom = status.range?.from;
      const rangeTo = status.range?.to;
      const updatedAt = status.updated_at
        ? new Date(status.updated_at).toLocaleString("ko-KR")
        : "";

      const rangeText = rangeFrom && rangeTo
        ? `${rangeFrom} ~ ${rangeTo}`
        : "서울 현재 날짜부터 미래 3개월";

      document.getElementById("status").textContent =
        `Investing.com · 한국 · 중요도 높음 · ${rangeText} · ` +
        `${normalizedEvents.length}건` +
        (updatedAt ? ` · ${updatedAt} 갱신` : "");

      const notice = document.getElementById("notice");
      if (normalizedEvents.length === 0) {
        notice.style.display = "block";
        notice.textContent =
          status.message ||
          "표시할 실적 일정이 없습니다. Actions 실행 결과와 status.json을 확인해 주세요.";
      } else if (status.ok === false && status.used_cache) {
        notice.style.display = "block";
        notice.textContent = status.message;
      }

      const isMobile = window.innerWidth < 680;

      const options = {
        locale: "ko",
        initialDate: rangeFrom || undefined,
        initialView: isMobile ? "listMonth" : "dayGridMonth",
        height: "auto",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: isMobile ? "listMonth" : "dayGridMonth,listMonth"
        },
        buttonText: {
          today: "오늘",
          month: "월",
          list: "목록"
        },
        displayEventTime: false,
        eventDisplay: "block",
        dayMaxEvents: true,
        events: normalizedEvents,

        // FullCalendar 기본 렌더러 대신 제목을 직접 넣어
        // '기업명 실적' 문구가 반드시 보이게 합니다.
        eventContent(info) {
          return {
            domNodes: [eventNode(info.event.title)]
          };
        },

        eventDidMount(info) {
          info.el.title = info.event.title;
        },

        eventClick(info) {
          info.jsEvent.preventDefault();
          if (info.event.url) {
            window.open(info.event.url, "_blank", "noopener");
          }
        }
      };

      if (rangeFrom && rangeTo) {
        options.validRange = {
          start: rangeFrom,
          end: addOneDay(rangeTo)
        };
      }

      const calendar = new FullCalendar.Calendar(
        document.getElementById("calendar"),
        options
      );
      calendar.render();
    }

    loadCalendar().catch((error) => {
      console.error(error);
      const notice = document.getElementById("notice");
      notice.style.display = "block";
      notice.textContent =
        "캘린더 데이터를 불러오지 못했습니다: " + error.message;
      document.getElementById("status").textContent = "데이터 로드 실패";
    });
  </script>
</body>
</html>
