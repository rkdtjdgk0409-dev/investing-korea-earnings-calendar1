<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>한국 기업 실적 캘린더</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
  <style>
    :root {
      --bg: #10151b;
      --panel: #171e26;
      --line: #2a3440;
      --text: #f3f6f8;
      --muted: #96a0aa;
      --event: #273543;
      --warning-bg: #352d1f;
      --warning-line: #6e5b36;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
    }

    #status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    #notice {
      display: none;
      margin-bottom: 12px;
      padding: 11px 13px;
      border: 1px solid var(--warning-line);
      border-radius: 9px;
      background: var(--warning-bg);
      font-size: 13px;
      line-height: 1.5;
    }

    .ics {
      flex: 0 0 auto;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
    }

    #calendar {
      min-height: 680px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
    }

    .fc {
      --fc-border-color: var(--line);
      --fc-page-bg-color: var(--panel);
      --fc-neutral-bg-color: #1d2630;
      --fc-list-event-hover-bg-color: #25313d;
    }

    .fc .fc-toolbar-title { font-size: 18px; }

    .fc .fc-button-primary {
      border-color: #394653;
      background: #28333f;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      border-color: #4b5966;
      background: #3a4856;
    }

    .fc .fc-daygrid-day-number,
    .fc .fc-col-header-cell-cushion {
      color: var(--text);
      text-decoration: none;
    }

    .fc .fc-event {
      padding: 2px 4px;
      border: 0;
      background: var(--event);
      cursor: pointer;
    }

    .fc .fc-event-title { font-weight: 650; }

    @media (max-width: 680px) {
      .wrap { padding: 8px; }
      .top { align-items: flex-start; }
      h1 { font-size: 18px; }
      #calendar { min-height: 620px; padding: 4px; }
      .fc .fc-toolbar { gap: 4px; }
      .fc .fc-toolbar-title { font-size: 15px; }
      .fc .fc-button { padding: .35em .5em; font-size: .85em; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>한국 기업 실적 캘린더</h1>
        <div id="status">데이터를 불러오는 중입니다.</div>
      </div>
      <a class="ics" href="./earnings.ics">ICS</a>
    </div>

    <div id="notice"></div>
    <div id="calendar"></div>
  </main>

  <script>
    function nextDay(isoDate) {
      const date = new Date(isoDate + "T00:00:00+09:00");
      date.setDate(date.getDate() + 1);
      return date.toISOString().slice(0, 10);
    }

    async function load() {
      const cacheKey = Date.now();

      const [eventsResponse, statusResponse] = await Promise.all([
        fetch("./data/events.json?ts=" + cacheKey),
        fetch("./data/status.json?ts=" + cacheKey)
      ]);

      if (!eventsResponse.ok) {
        throw new Error("events.json을 불러오지 못했습니다.");
      }

      const rawEvents = await eventsResponse.json();
      const status = statusResponse.ok
        ? await statusResponse.json()
        : {};

      const events = rawEvents
        .map((event) => ({
          ...event,
          marketCap: Number(event.marketCap || 0),
          title:
            event.title ||
            ((event.company || event.ticker || "기업") + " 실적")
        }))
        .sort((a, b) => {
          const dateResult = String(a.start).localeCompare(String(b.start));
          if (dateResult !== 0) return dateResult;

          const marketCapResult = b.marketCap - a.marketCap;
          if (marketCapResult !== 0) return marketCapResult;

          return a.title.localeCompare(b.title, "ko");
        });

      const rangeFrom = status.range?.from;
      const rangeTo = status.range?.to;
      const updatedAt = status.updated_at
        ? new Date(status.updated_at).toLocaleString("ko-KR")
        : "";

      document.getElementById("status").textContent =
        `Investing.com · 한국 · 중요도 높음 · 시가총액순 · ` +
        `${rangeFrom || "오늘"} ~ ${rangeTo || "미래 3개월"} · ` +
        `${events.length}건` +
        (updatedAt ? ` · ${updatedAt} 갱신` : "");

      const notice = document.getElementById("notice");

      if (events.length === 0) {
        notice.style.display = "block";
        notice.textContent =
          status.message ||
          "표시할 일정이 없습니다. Actions를 다시 실행해 주세요.";
      } else if (status.last_event_date && rangeTo &&
                 status.last_event_date < rangeTo) {
        notice.style.display = "block";
        notice.textContent =
          `데이터 조회 범위는 ${rangeTo}까지입니다. ` +
          `현재 Investing.com에 등록된 마지막 실적 일정은 ` +
          `${status.last_event_date}입니다.`;
      }

      const options = {
        locale: "ko",
        initialDate: rangeFrom || undefined,
        initialView:
          window.innerWidth < 680 ? "listMonth" : "dayGridMonth",
        height: "auto",

        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right:
            window.innerWidth < 680
              ? "listMonth"
              : "dayGridMonth,listMonth"
        },

        buttonText: {
          today: "오늘",
          month: "월",
          list: "목록"
        },

        events,
        eventDisplay: "block",
        displayEventTime: false,
        dayMaxEvents: true,

        // 같은 날짜에서는 시가총액 큰 기업부터 표시합니다.
        eventOrder: "-marketCap,title",
        eventOrderStrict: true,

        eventClick(info) {
          info.jsEvent.preventDefault();
          if (info.event.url) {
            window.open(info.event.url, "_blank", "noopener");
          }
        }
      };

      // 서울 오늘부터 정확히 미래 3개월까지만 탐색하도록 제한합니다.
      if (rangeFrom && rangeTo) {
        options.validRange = {
          start: rangeFrom,
          end: nextDay(rangeTo)
        };
      }

      const calendar = new FullCalendar.Calendar(
        document.getElementById("calendar"),
        options
      );

      calendar.render();
    }

    load().catch((error) => {
      console.error(error);
      document.getElementById("status").textContent =
        "캘린더 데이터를 불러오지 못했습니다.";

      const notice = document.getElementById("notice");
      notice.style.display = "block";
      notice.textContent = error.message;
    });
  </script>
</body>
</html>
