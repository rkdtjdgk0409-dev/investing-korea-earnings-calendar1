name: 한국 기업 실적 캘린더 갱신

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1,7,13,19 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write

concurrency:
  group: earnings-calendar-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 폴더 준비
        run: |
          mkdir -p scripts docs/data
          touch docs/.nojekyll

          # 이전 구조를 사용 중이면 최상단 파일을 scripts 폴더로 복사
          if [ -f update_calendar.py ]; then
            cp update_calendar.py scripts/update_calendar.py
          fi

          if [ -f index.html ] && [ ! -f docs/index.html ]; then
            cp index.html docs/index.html
          fi

      - name: Python 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 한국 기업 실적 데이터 갱신
        run: python scripts/update_calendar.py

      - name: 갱신 결과 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs scripts/update_calendar.py

          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "Fix: 한국 실적 캘린더 데이터 수집"
            git push
          fi
