name: 한국 기업 실적 캘린더 갱신

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다.
    # 매일 한국시간 07:17, 13:17, 19:17, 01:17에 실행됩니다.
    - cron: "17 22,4,10,16 * * *"

permissions:
  contents: write

concurrency:
  group: earnings-calendar-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Investing.com 데이터 갱신
        run: python scripts/update_calendar.py

      - name: 결과 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/events.json docs/data/status.json docs/earnings.ics docs/data/*.png
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "자동 갱신: 한국 주요 기업 실적"
            git push
          fi
