name: 한국 기업 실적 캘린더 갱신 v6

on:
  workflow_dispatch:
  schedule:
    # 매일 한국시간 오전 07:17 실행(UTC 22:17)
    - cron: "17 22 * * *"

permissions:
  contents: write

concurrency:
  group: korea-earnings-calendar-v6
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 한국 상장사 실적 일정 갱신
        run: python update_calendar.py

      - name: 출력 데이터 검증
        run: python validate_output.py

      - name: 결과 GitHub에 저장
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/events.json docs/data/status.json docs/earnings.ics

          if git diff --cached --quiet; then
            echo "변경 사항이 없습니다."
            exit 0
          fi

          git commit -m "자동 갱신: 한국 기업 실적 캘린더 v6"
          git push

