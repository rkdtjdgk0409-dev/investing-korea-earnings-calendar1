name: 한국 기업 실적 캘린더 갱신

on:
  workflow_dispatch:
  schedule:
    # UTC 22:17 = 한국시간 다음 날 오전 7:17
    - cron: "17 22 * * *"

permissions:
  contents: write

concurrency:
  group: korea-earnings-calendar-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Python 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 서울 오늘부터 미래 3개월 실적 갱신
        run: python update_calendar.py

      - name: 결과 GitHub에 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/events.json
          git add docs/data/status.json
          git add docs/earnings.ics

          if git diff --cached --quiet; then
            echo "변경 사항이 없습니다."
          else
            git commit -m "자동 갱신: 미래 3개월 한국 실적"
            git push
          fi
